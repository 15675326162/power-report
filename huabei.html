<!DOCTYPE html>
<html><head>
<meta charset="utf-8">

<title>华北大区 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">

  <div class="stats">

    <div class="s"><b>16</b>城市数</div>
    <div class="s"><b>5</b>🔴未处理</div>
    <div class="s"><b>25</b>🆕新增</div>
    <div class="s"><b>14点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>刘景丰</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🆕新", "city": "石家庄市", "vid": "5320213762", "lost": 39, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "一战-正定新区-诸福屯社区"},{"rank": 2, "status": "🔴7轮", "city": "石家庄市", "vid": "7010405666", "lost": 32, "h1": 11, "delta": "<span class='up'>↑11</span>", "grid": "一战-正定新区-诸福屯社区"},{"rank": 3, "status": "🔴13轮", "city": "济南市", "vid": "5320149405", "lost": 20, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "济南市-历城区-彩石街道-职业学院"},{"rank": 4, "status": "🔴13轮", "city": "济南市", "vid": "5320141208", "lost": 15, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "神武-济南市-历城区-港沟街道-神武"},{"rank": 5, "status": "🔴13轮", "city": "秦皇岛市", "vid": "7990026827", "lost": 8, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "开发1-a区"},{"rank": 6, "status": "🆕新", "city": "临沂市", "vid": "7960072052", "lost": 6, "h1": 5, "delta": "<span class='flat'>-</span>", "grid": "兰山1-1区R"},{"rank": 7, "status": "🆕新", "city": "威海市", "vid": "5910772268", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "助力车高区西"},{"rank": 8, "status": "🆕新", "city": "济南市", "vid": "5320126891", "lost": 5, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "济南市-历城区-祝甸街道-桑园路"},{"rank": 9, "status": "🆕新", "city": "东营市", "vid": "5310623956", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "超区·东北"},{"rank": 10, "status": "🆕新", "city": "沧州市", "vid": "7780035511", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "一战-吾悦广场-5-4"},{"rank": 11, "status": "🆕新", "city": "长清区", "vid": "5930033402", "lost": 4, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "大学城南区-长清"},{"rank": 12, "status": "🔴2轮", "city": "威海市", "vid": "6680031591", "lost": 4, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "助力车高区西"},{"rank": 13, "status": "🆕新", "city": "沧州市", "vid": "7780043217", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "新华-荣盛锦绣天地-6-3"},{"rank": 14, "status": "🆕新", "city": "石家庄市", "vid": "5310580577", "lost": 4, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "一战-桥西区-西美花街"},{"rank": 15, "status": "🆕新", "city": "秦皇岛市", "vid": "7960228589", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "海港区超区南"},{"rank": 16, "status": "🆕新", "city": "淄博市", "vid": "7010462580", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "（柳）核心-2区-奥朗特"},{"rank": 17, "status": "🆕新", "city": "秦皇岛市", "vid": "7960236446", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "海港3-J区"},{"rank": 18, "status": "🆕新", "city": "东营市", "vid": "5310089353", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "东2区-翠湖小区"},{"rank": 19, "status": "🆕新", "city": "济南市", "vid": "5320150276", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 20, "status": "🆕新", "city": "济南市", "vid": "5320141182", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "济南市-历城区-彩石街道-职业学院"},{"rank": 21, "status": "🆕新", "city": "唐山市", "vid": "7010460140", "lost": 3, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "锦江国际饭店-火车站"},{"rank": 22, "status": "🆕新", "city": "青岛市", "vid": "5930072861", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "高新西区-腾讯小镇"},{"rank": 23, "status": "🆕新", "city": "单县", "vid": "7110169099", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "主城Z-单县-华北鲁西-单县北城街道-王六村-单县小区4R"},{"rank": 24, "status": "🆕新", "city": "诸城市", "vid": "5310380423", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 25, "status": "🆕新", "city": "石家庄市", "vid": "5310786752", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "三战-高开区-科技中心"},{"rank": 26, "status": "🆕新", "city": "滨州市", "vid": "5310644977", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "新东5（新）"},{"rank": 27, "status": "🆕新", "city": "日照市", "vid": "5310578822", "lost": 3, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "主城Z-日照市-山东体育学院日照校区"},{"rank": 28, "status": "🆕新", "city": "青岛市", "vid": "7990009719", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "城阳-东田社区"},{"rank": 29, "status": "🆕新", "city": "固安县", "vid": "5310614454", "lost": 3, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "固安新中街"},{"rank": 30, "status": "🆕新", "city": "沧州市", "vid": "7780032204", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "运南-医疗专科学校-4-1"}];
var CITIES=["东营市", "临沂市", "单县", "唐山市", "固安县", "威海市", "日照市", "沧州市", "济南市", "淄博市", "滨州市", "石家庄市", "秦皇岛市", "诸城市", "长清区", "青岛市"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/$|\.html$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
