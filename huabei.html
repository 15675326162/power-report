<!DOCTYPE html>
<html><head>
<meta charset="utf-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">

    <div class="s"><b>14</b>城市数</div>
    <div class="s"><b>16</b>🔴未处理</div>
    <div class="s"><b>14</b>🆕新增</div>
    <div class="s"><b>17点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>刘景丰</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🔴2轮", "city": "石家庄市", "vid": "5320261416", "lost": 53, "h1": 5, "delta": "<span class='up'>↑5</span>", "grid": "一战-正定新区-会展中心"},{"rank": 2, "status": "🔴2轮", "city": "潍坊市", "vid": "6680030208", "lost": 19, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "潍坊市-高新区南电力网格"},{"rank": 3, "status": "🆕新", "city": "石家庄市", "vid": "5310168780", "lost": 16, "h1": 14, "delta": "<span class='flat'>-</span>", "grid": "三战-高开-和合美家"},{"rank": 4, "status": "🔴2轮", "city": "东营市", "vid": "5310520011", "lost": 12, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "西8区-汽车站"},{"rank": 5, "status": "🔴2轮", "city": "潍坊市", "vid": "5910819660", "lost": 11, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "潍坊市-高新区南电力网格"},{"rank": 6, "status": "🔴2轮", "city": "石家庄市", "vid": "5310074869", "lost": 11, "h1": 6, "delta": "<span class='up'>↑6</span>", "grid": "二战-新华区-省人民医院"},{"rank": 7, "status": "🔴2轮", "city": "徐水区", "vid": "2000041160", "lost": 10, "h1": 6, "delta": "<span class='up'>↑6</span>", "grid": "朝阳大街东"},{"rank": 8, "status": "🆕新", "city": "石家庄市", "vid": "5310583603", "lost": 10, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "鹿泉-西站南侧"},{"rank": 9, "status": "🔴2轮", "city": "潍坊市", "vid": "5910828228", "lost": 9, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "潍坊市-奎文区南电力网格"},{"rank": 10, "status": "🔴2轮", "city": "大厂回族自治县", "vid": "5910872680", "lost": 9, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "大厂作业网格"},{"rank": 11, "status": "🆕新", "city": "石家庄市", "vid": "5320260965", "lost": 8, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "一战-正定新区-朱河村"},{"rank": 12, "status": "🆕新", "city": "石家庄市", "vid": "5310347379", "lost": 8, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "一战-正定古城-国际小商品市场"},{"rank": 13, "status": "🔴2轮", "city": "济南市", "vid": "5320068975", "lost": 8, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "济南市-历城区-华山街道-艺术学院"},{"rank": 14, "status": "🆕新", "city": "张家口市", "vid": "5310596653", "lost": 7, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "张家口市-南部区域"},{"rank": 15, "status": "🔴2轮", "city": "石家庄市", "vid": "5310157409", "lost": 7, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "二战-新华区-河北经贸大学"},{"rank": 16, "status": "🔴2轮", "city": "张家口市", "vid": "5310825439", "lost": 7, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "张家口市-北部区域"},{"rank": 17, "status": "🆕新", "city": "滨州市", "vid": "5310584665", "lost": 7, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "中2区"},{"rank": 18, "status": "🔴2轮", "city": "张家口市", "vid": "5320346493", "lost": 6, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "张家口市-北部区域"},{"rank": 19, "status": "🆕新", "city": "大厂回族自治县", "vid": "5910784567", "lost": 6, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "大厂作业网格"},{"rank": 20, "status": "🔴2轮", "city": "临沂市", "vid": "7960088485", "lost": 6, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "南坊1区R"},{"rank": 21, "status": "🆕新", "city": "石家庄市", "vid": "5310115313", "lost": 6, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "三战-高开区-轨道学院"},{"rank": 22, "status": "🆕新", "city": "济南市", "vid": "5320114696", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "济南市-历城区-洪楼街道-七里堡"},{"rank": 23, "status": "🔴2轮", "city": "芝麻墩街道", "vid": "7780176219", "lost": 5, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "芝麻墩镇两轮网格"},{"rank": 24, "status": "🔴2轮", "city": "济南市", "vid": "5320123414", "lost": 5, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "济南市-历城区-港沟街道-融创茂西"},{"rank": 25, "status": "🆕新", "city": "高碑店市", "vid": "5930075812", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "高碑店-迎宾路西"},{"rank": 26, "status": "🆕新", "city": "滨州市", "vid": "5310584525", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "新东5（新）"},{"rank": 27, "status": "🔴2轮", "city": "石家庄市", "vid": "5310335281", "lost": 5, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "三战-裕华区-风尚水郡"},{"rank": 28, "status": "🆕新", "city": "青岛市", "vid": "3760080777", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "崂山西区-海洋公园"},{"rank": 29, "status": "🆕新", "city": "长清区", "vid": "5930025025", "lost": 4, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "大学城北区-长清"},{"rank": 30, "status": "🆕新", "city": "周村区", "vid": "5310135939", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "周村区-城区西区"}];
var CITIES=["东营市", "临沂市", "周村区", "大厂回族自治县", "张家口市", "徐水区", "济南市", "滨州市", "潍坊市", "石家庄市", "芝麻墩街道", "长清区", "青岛市", "高碑店市"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/$|\.html$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
