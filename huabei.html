<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>华北大区 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">
  <h1>📍 华北大区 — 高频缺电 TOP 16</h1>
  <div class="stats">
    <div class="s"><b>70</b>累计丢单</div>
    <div class="s"><b>11</b>分组数</div>
    <div class="s"><b>16</b>🔴未处理</div>
    <div class="s"><b>0</b>🆕新增</div>
    <div class="s"><b>15点</b>时段</div>
    <div class="s"><b>刘景丰</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>分组</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🔴2轮", "tag": "白沟镇", "vid": "5930070437", "lost": 8, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "白沟镇两轮融合网格西部片区"},{"rank": 2, "status": "🔴3轮", "tag": "济南市", "vid": "5320139368", "lost": 6, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "济南市-历城区-祝甸街道-桑园路"},{"rank": 3, "status": "🔴2轮", "tag": "临沂市", "vid": "7960060712", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "兰山1-3区R"},{"rank": 4, "status": "🔴2轮", "tag": "石家庄市", "vid": "5310795367", "lost": 5, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "三战A-超区-裕华区"},{"rank": 5, "status": "🔴2轮", "tag": "张家口市", "vid": "5310538438", "lost": 5, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "张家口市-北部区域"},{"rank": 6, "status": "🔴3轮", "tag": "张家口市", "vid": "5320389076", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "张家口市-东部区域"},{"rank": 7, "status": "🔴3轮", "tag": "滨州市", "vid": "5310496061", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "新东5（新）"},{"rank": 8, "status": "🔴2轮", "tag": "张家口市", "vid": "7010390845", "lost": 5, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "张家口市-东部区域"},{"rank": 9, "status": "🔴2轮", "tag": "邹平市", "vid": "5310065825", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "超区L-一战A-高新区-高新区街道-二级超区邹平市-资产B"},{"rank": 10, "status": "🔴2轮", "tag": "微山县", "vid": "5930042055", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "微山县电力网格"},{"rank": 11, "status": "🔴2轮", "tag": "济阳区", "vid": "7960057342", "lost": 3, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "核心3"},{"rank": 12, "status": "🔴2轮", "tag": "济南市", "vid": "5320133542", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "济南市-历城区-祝甸街道-花园路沿线"},{"rank": 13, "status": "🔴2轮", "tag": "淄博市", "vid": "5320329605", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "恒大正承网格"},{"rank": 14, "status": "🔴2轮", "tag": "潍坊市", "vid": "5910761522", "lost": 3, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "潍坊市-奎文区南电力网格"},{"rank": 15, "status": "🔴2轮", "tag": "济南市", "vid": "5320119722", "lost": 3, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "济南市-历城区-唐冶街道-银座新辰北"},{"rank": 16, "status": "🔴2轮", "tag": "淄博市", "vid": "5320380693", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "恒大正承网格"}];
var TAGS=["临沂市", "张家口市", "微山县", "济南市", "济阳区", "淄博市", "滨州市", "潍坊市", "白沟镇", "石家庄市", "邹平市"];
var selected=new Set();
function initTags(){var box=document.getElementById('cityTags');TAGS.forEach(function(c){var t=document.createElement('span');t.className='city-tag';t.textContent=c;t.onclick=function(){if(selected.has(c)){selected.delete(c);t.className='city-tag';}else{selected.add(c);t.className='city-tag active';}render();};box.appendChild(t);});}
function apply(){render();}
function render(){var lost=parseInt(document.getElementById('fLost').value)||0;var rows=DATA.filter(function(r){return(selected.size===0||selected.has(r.tag))&&r.lost>=lost;});var html='';rows.forEach(function(r,i){var isRep=r.status.indexOf('🔴')>=0;html+='<tr class="'+(isRep?'rep':'')+'">';html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';html+='<td>'+r.tag+'</td>';html+='<td class="vid">'+r.vid+'</td>';html+='<td class="num">'+r.lost+'</td>';html+='<td class="h1n">'+r.h1+'</td>';html+='<td>'+r.delta+'</td>';html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';html+='</tr>';});document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据</td></tr>';document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';}
function reset(){selected.clear();var tags=document.querySelectorAll('.city-tag');for(var i=0;i<tags.length;i++)tags[i].className='city-tag';document.getElementById('fLost').value='';render();}
initTags();render();
</script>
</body></html>
