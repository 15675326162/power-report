<!DOCTYPE html>
<html><head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">

    <div class="s"><b>21</b>🆕新增</div>
    <div class="s"><b>15点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>刘景丰</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🔴36轮", "city": "长清区", "vid": "5310336417", "lost": 14, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "null"},{"rank": 2, "status": "🔴6轮", "city": "张家口市", "vid": "5310535388", "lost": 13, "h1": 5, "delta": "<span class='up'>↑5</span>", "grid": "张家口市-北部区域"},{"rank": 3, "status": "🔴6轮", "city": "霸州市", "vid": "5930075036", "lost": 12, "h1": 8, "delta": "<span class='up'>↑8</span>", "grid": "霸州市-核心-体育公园"},{"rank": 4, "status": "🔴6轮", "city": "张家口市", "vid": "5310558006", "lost": 9, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "张家口市-东部区域"},{"rank": 5, "status": "🔴6轮", "city": "张家口市", "vid": "5320319978", "lost": 9, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "张家口市-北部区域"},{"rank": 6, "status": "🆕新", "city": "河间市", "vid": "3720130765", "lost": 7, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "河间-第二中学-1"},{"rank": 7, "status": "🔴6轮", "city": "石家庄市", "vid": "5320261257", "lost": 6, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "一战-桥西区-西美花街"},{"rank": 8, "status": "🆕新", "city": "石家庄市", "vid": "5310580577", "lost": 6, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "一战-桥西区-西美花街"},{"rank": 9, "status": "🔴6轮", "city": "日照市", "vid": "5310578822", "lost": 6, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "主城Z-日照市-山东体育学院日照校区"},{"rank": 10, "status": "🆕新", "city": "潍坊市", "vid": "5910808650", "lost": 6, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "潍坊市-高新区南电力网格"},{"rank": 11, "status": "🆕新", "city": "石家庄市", "vid": "7010405042", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "三战-高开区-天山熙湖"},{"rank": 12, "status": "🆕新", "city": "大厂回族自治县", "vid": "5910771195", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "大厂作业网格"},{"rank": 13, "status": "🆕新", "city": "白沟镇", "vid": "5930067549", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "白沟镇两轮融合网格西部片区"},{"rank": 14, "status": "🆕新", "city": "高碑店市", "vid": "7720166749", "lost  "status": "🆕新", "city": "临邑县", "vid": "7960232959", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 29, "status": "🆕新", "city": "东光县", "vid": "5930078366", "lost": 3, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "东光城南区"},{"rank": 30, "status": "🆕新", "city": "石家庄市", "vid": "7010412802", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "三战-高开区-轨道学院"}];
var CITIES=["东光县", "临邑县", "固安县", "大厂回族自治县", "威海市", "安平县", "张家口市", "德州市", "日照市", "沧州市", "河间市", "济南市", "潍坊市", "白沟镇", "石家庄市", "肥城市", "诸城市", "长清区", "霸州市", "馆陶县", "高碑店市"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/$|\.html$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
