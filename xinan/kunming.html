<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>昆明市 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style></head><body>
<div class="hd">
  <h1>📍 昆明市 — 高频缺电 TOP 12</h1>
  <div class="stats">
    <div class="s"><b>105</b>累计丢单</div>
    <div class="s"><b>0</b>🔴未处理</div>
    <div class="s"><b>12</b>🆕新增</div>
    <div class="s"><b>15点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>胡超</b>负责人</div>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th><th>状态</th><th>车编</th>
  <th style="text-align:right">累计</th><th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th><th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🆕新", "vid": "5320297938", "lost": 31, "h1": 14, "delta": "<span class='flat'>-</span>", "grid": "昆明电力1-官渡2-云大西路"},{"rank": 2, "status": "🆕新", "vid": "5320164463", "lost": 14, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "昆明-呈贡-七彩云南"},{"rank": 3, "status": "🆕新", "vid": "5320299911", "lost": 14, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "昆明电力2-五华-高新6区"},{"rank": 4, "status": "🆕新", "vid": "5320373623", "lost": 9, "h1": 9, "delta": "<span class='flat'>-</span>", "grid": "昆明电力1-官渡2-经开茶高山"},{"rank": 5, "status": "🆕新", "vid": "5320194437", "lost": 8, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "昆明电力2-西山-度假区"},{"rank": 6, "status": "🆕新", "vid": "5320331902", "lost": 6, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "昆明电力1-官渡超区"},{"rank": 7, "status": "🆕新", "vid": "5320201062", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "昆明电力2-西山-西山公园"},{"rank": 8, "status": "🆕新", "vid": "5320157962", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "昆明电力2-西山-五一路"},{"rank": 9, "status": "🆕新", "vid": "5320365853", "lost": 4, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "昆明电力2-五华-翠湖区"},{"rank": 10, "status": "🆕新", "vid": "5320177349", "lost": 3, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "昆明电力1-盘龙-红云3区"},{"rank": 11, "status": "🆕新", "vid": "5320195392", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 12, "status": "🆕新", "vid": "5320184690", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "昆明电力1-盘龙-北市1区"}];
function render(){
  var html='';
  DATA.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="7" class="empty">暂无数据</td></tr>';
  document.getElementById('cnt').textContent='共 '+DATA.length+' 条';
}
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/\$|\.html\$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
