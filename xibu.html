<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>西部大区 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">
  <h1>📍 西部大区 — 高频缺电 TOP 28</h1>
  <div class="stats">
    <div class="s"><b>125</b>累计丢单</div>
    <div class="s"><b>10</b>城市数</div>
    <div class="s"><b>28</b>🔴未处理</div>
    <div class="s"><b>0</b>🆕新增</div>
    <div class="s"><b>19点</b>时段</div>
    <div class="s"><b>侯凯晨</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🔴6轮", "city": "银川市", "vid": "5320036571", "lost": 10, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "金凤区-北7区"},{"rank": 2, "status": "🔴3轮", "city": "鄂尔多斯市", "vid": "7010455208", "lost": 9, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "教育园区"},{"rank": 3, "status": "🔴6轮", "city": "阳泉市", "vid": "5320311242", "lost": 7, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 4, "status": "🔴3轮", "city": "新市区", "vid": "3720177475", "lost": 7, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "米东-文体公园"},{"rank": 5, "status": "🔴3轮", "city": "鄂尔多斯市", "vid": "7010440296", "lost": 7, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "东胜A3"},{"rank": 6, "status": "🔴6轮", "city": "伊宁市", "vid": "5310624967", "lost": 6, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "伊宁市电力1区"},{"rank": 7, "status": "🔴3轮", "city": "拉萨市", "vid": "5320246999", "lost": 5, "h1": 5, "delta": "<span class='flat'>-</span>", "grid": "电力-柳梧火车站网格"},{"rank": 8, "status": "🔴3轮", "city": "新市区", "vid": "6680065243", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 9, "status": "🔴3轮", "city": "拉萨市", "vid": "5320246871", "lost": 5, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "电力-布达拉宫网格"},{"rank": 10, "status": "🔴6轮", "city": "晋中市", "vid": "5320210452", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "晋中电力7区新晋世家"},{"rank": 11, "status": "🔴3轮", "city": "新市区", "vid": "3720167339", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "新市区-核心-警察学校"},{"rank": 12, "status": "🔴3轮", "city": "拉萨市", "vid": "5320246877", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "电力-八廓街网格"},{"rank": 13, "status": "🔴3轮", "city": "新市区", "vid": "3720140248", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "新市区-核心-植物园"},{"rank": 14, "status": "🔴3轮", "city": "阳泉市", "vid": "5320315651", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "阳泉南二区"},{"rank": 15, "status": "🔴6轮", "city": "通辽市", "vid": "5310518981", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 16, "status": "🔴3轮", "city": "银川市", "vid": "5320349089", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "金凤区-南3区"},{"rank": 17, "status": "🔴3轮", "city": "鄂尔多斯市", "vid": "7010395692", "lost": 3, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "康巴什区1网格"},{"rank": 18, "status": "🔴3轮", "city": "银川市", "vid": "5320349461", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "兴庆区-超区 2"},{"rank": 19, "status": "🔴3轮", "city": "新市区", "vid": "3720148775", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "新市区-核心-财经大学"},{"rank": 20, "status": "🔴3轮", "city": "拉萨市", "vid": "5320209839", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "电力-八一路网格"},{"rank": 21, "status": "🔴3轮", "city": "新市区", "vid": "3720177340", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 22, "status": "🔴3轮", "city": "鄂尔多斯市", "vid": "5310606662", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "康巴什区3网格"},{"rank": 23, "status": "🔴3轮", "city": "新市区", "vid": "5310573197", "lost": 3, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "新市区-隔离-三工六队"},{"rank": 24, "status": "🔴3轮", "city": "临夏市", "vid": "7010525881", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "临夏4区-1"},{"rank": 25, "status": "🔴3轮", "city": "鄂尔多斯市", "vid": "7010484585", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "东胜B1"},{"rank": 26, "status": "🔴3轮", "city": "兰州市", "vid": "5320312251", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "兰州市-二区-城关-甘肃二院"},{"rank": 27, "status": "🔴3轮", "city": "鄂尔多斯市", "vid": "5310613983", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "康巴什区3网格"},{"rank": 28, "status": "🔴3轮", "city": "鄂尔多斯市", "vid": "5310636127", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "伊旗2区"}];
var CITIES=["临夏市", "伊宁市", "兰州市", "拉萨市", "新市区", "晋中市", "通辽市", "鄂尔多斯市", "银川市", "阳泉市"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
</body></html>
