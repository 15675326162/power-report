<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>北方大区 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">
  <h1>📍 北方大区 — 高频缺电 TOP 30</h1>
  <div class="stats">
    <div class="s"><b>204</b>累计丢单</div>
    <div class="s"><b>18</b>城市数</div>
    <div class="s"><b>10</b>🔴未处理</div>
    <div class="s"><b>20</b>🆕新增</div>
    <div class="s"><b>19点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>乔春阳、张小灵</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🔴11轮", "city": "松原市", "vid": "5320021356", "lost": 18, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "电力网格、江北"},{"rank": 2, "status": "🔴3轮", "city": "沈阳市", "vid": "5320338403", "lost": 12, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "二战A-和平区-新世界"},{"rank": 3, "status": "🔴3轮", "city": "南阳市", "vid": "5320347539", "lost": 11, "h1": 5, "delta": "<span class='up'>↑5</span>", "grid": "null"},{"rank": 4, "status": "🆕新", "city": "沈阳市", "vid": "5320440343", "lost": 11, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "二战A-和平区-盛京医院"},{"rank": 5, "status": "🆕新", "city": "信阳市", "vid": "5320053780", "lost": 10, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "市中心4"},{"rank": 6, "status": "🔴3轮", "city": "西青区", "vid": "5310315646", "lost": 9, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "五战-西青区-高新区A"},{"rank": 7, "status": "🔴7轮", "city": "沈阳市", "vid": "5320322233", "lost": 9, "h1": 5, "delta": "<span class='up'>↑5</span>", "grid": "二战A-和平区-东北大学东"},{"rank": 8, "status": "🆕新", "city": "沈阳市", "vid": "5320392855", "lost": 8, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "二战A-和平区-盛京医院"},{"rank": 9, "status": "🔴7轮", "city": "漯河市", "vid": "3930061111", "lost": 8, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "源汇区-高铁站"},{"rank": 10, "status": "🔴7轮", "city": "商丘市", "vid": "5320454325", "lost": 8, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "6区吾悦广场"},{"rank": 11, "status": "🆕新", "city": "西青区", "vid": "5310476712", "lost": 7, "h1": 7, "delta": "<span class='flat'>-</span>", "grid": "五战-西青区-高新区B"},{"rank": 12, "status": "🔴3轮", "city": "南阳市", "vid": "5320275107", "lost": 7, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "南阳西5区电"},{"rank": 13, "status": "🆕新", "city": "邓州市", "vid": "7960119053", "lost": 7, "h1": 7, "delta": "<span class='flat'>-</span>", "grid": "东1"},{"rank": 14, "status": "🆕新", "city": "沈阳市", "vid": "5320382061", "lost": 7, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "二战B-浑南区-彩霞街"},{"rank": 15, "status": "🔴3轮", "city": "南阳市", "vid": "5320324986", "lost": 7, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "南阳西6区电"},{"rank": 16, "status": "🆕新", "city": "沈阳市", "vid": "5310618946", "lost": 6, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "一战B-大东区-第一人民医院北"},{"rank": 17, "status": "🔴3轮", "city": "松原市", "vid": "7010489452", "lost": 6, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "电力网格、江北"},{"rank": 18, "status": "🆕新", "city": "沈阳市", "vid": "5310481636", "lost": 6, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "三战A-铁西区-沈阳站西广场"},{"rank": 19, "status": "🆕新", "city": "滨海新区", "vid": "5310349997", "lost": 5, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "三战-汉沽-网格B"},{"rank": 20, "status": "🆕新", "city": "宝丰县", "vid": "7110339318", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "宝丰-西"},{"rank": 21, "status": "🆕新", "city": "滨海新区", "vid": "5310441328", "lost": 5, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "三战-滨海-网格D"},{"rank": 22, "status": "🆕新", "city": "临江市", "vid": "7110029513", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "临江-临江站"},{"rank": 23, "status": "🆕新", "city": "津南区", "vid": "7110376999", "lost": 4, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "津南换电网格辛庄"},{"rank": 24, "status": "🆕新", "city": "瓦房店市", "vid": "7110229684", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "瓦房店恒力重工产业园换电网格"},{"rank": 25, "status": "🆕新", "city": "滨海新区", "vid": "5310308618", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "三战-汉沽-网格B"},{"rank": 26, "status": "🆕新", "city": "郑州市", "vid": "5310698168", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "管城助力车电力网格"},{"rank": 27, "status": "🆕新", "city": "西华县", "vid": "7110320645", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 28, "status": "🆕新", "city": "登封市", "vid": "5320172484", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "登封市融合网格"},{"rank": 29, "status": "🆕新", "city": "开封市", "vid": "5310296754", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "北3区"},{"rank": 30, "status": "🆕新", "city": "嫩江市", "vid": "3720190574", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "电力网格3"}];
var CITIES=["临江市", "信阳市", "南阳市", "商丘市", "嫩江市", "宝丰县", "开封市", "松原市", "沈阳市", "津南区", "滨海新区", "漯河市", "瓦房店市", "登封市", "西华县", "西青区", "邓州市", "郑州市"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/$|\.html$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
