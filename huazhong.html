<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>华中大区 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">
  <h1>📍 华中大区 — 高频缺电 TOP 30</h1>
  <div class="stats">
    <div class="s"><b>202</b>累计丢单</div>
    <div class="s"><b>16</b>城市数</div>
    <div class="s"><b>12</b>🔴未处理</div>
    <div class="s"><b>18</b>🆕新增</div>
    <div class="s"><b>18点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>李月涛</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🆕新", "city": "合肥市", "vid": "5320485918", "lost": 35, "h1": 14, "delta": "<span class='flat'>-</span>", "grid": "电力一区-蜀山区-华府骏苑"},{"rank": 2, "status": "🆕新", "city": "合肥市", "vid": "5310698545", "lost": 15, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "电力一区-高新-西侧超区"},{"rank": 3, "status": "🆕新", "city": "阜南县", "vid": "7960066999", "lost": 12, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "阜南天筑广场商圈"},{"rank": 4, "status": "🔴19轮", "city": "长沙市", "vid": "5310396638", "lost": 11, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "T桂花坪"},{"rank": 5, "status": "🔴25轮", "city": "蚌埠市", "vid": "5320085642", "lost": 10, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "A区-宝龙广场"},{"rank": 6, "status": "🔴7轮", "city": "咸宁市", "vid": "5320406654", "lost": 8, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "高新区2（新）"},{"rank": 7, "status": "🔴7轮", "city": "六安市", "vid": "5320035431", "lost": 7, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "电-海心沙网格"},{"rank": 8, "status": "🆕新", "city": "合肥市", "vid": "5310394854", "lost": 7, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "电力一区-庐阳区-三孝口"},{"rank": 9, "status": "🆕新", "city": "蚌埠市", "vid": "5320080502", "lost": 6, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "B区-吾悦广场"},{"rank": 10, "status": "🔴19轮", "city": "合肥市", "vid": "5310776035", "lost": 6, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "电力二区-经开区-徽园"},{"rank": 11, "status": "🔴7轮", "city": "襄阳市", "vid": "5310575441", "lost": 5, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "樊城三区-火车站"},{"rank": 12, "status": "🆕新", "city": "合肥市", "vid": "5320358417", "lost": 5, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "电力超区-瑶海区-瑶海超区"},{"rank": 13, "status": "🆕新", "city": "随州市", "vid": "5310200303", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "随州水郡世家A9"},{"rank": 14, "status": "🔴7轮", "city": "滁州市", "vid": "5320362925", "lost": 5, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "电力网格-万达/滁州学院"},{"rank": 15, "status": "🆕新", "city": "合肥市", "vid": "5310798001", "lost": 5, "h1": 5, "delta": "<span class='flat'>-</span>", "grid": "电力二区-经开区-临湖社区"},{"rank": 16, "status": "🔴7轮", "city": "长沙市", "vid": "5320362351", "lost": 5, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "D黄花机场"},{"rank": 17, "status": "🆕新", "city": "池州市", "vid": "5930047630", "lost": 4, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "陵阳大道-平天湖景区-缓冲"},{"rank": 18, "status": "🆕新", "city": "襄阳市", "vid": "5310515957", "lost": 4, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "襄城五区-主城-庞公"},{"rank": 19, "status": "🆕新", "city": "长丰县", "vid": "5930031853", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "北城-北城世纪金源"},{"rank": 20, "status": "🔴7轮", "city": "长丰县", "vid": "7900274937", "lost": 4, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "北城-水岸人家"},{"rank": 21, "status": "🆕新", "city": "衡阳市", "vid": "7960252465", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "衡阳北4区"},{"rank": 22, "status": "🆕新", "city": "合肥市", "vid": "5320322553", "lost": 4, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "电力一区-高新-长宁社区"},{"rank": 23, "status": "🆕新", "city": "蚌埠市", "vid": "5320084845", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "B区-市政府"},{"rank": 24, "status": "🔴7轮", "city": "随州市", "vid": "5310178785", "lost": 4, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "随州解放路下行A1"},{"rank": 25, "status": "🔴7轮", "city": "肥西县", "vid": "5310140953", "lost": 4, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "肥西-绿地中心"},{"rank": 26, "status": "🆕新", "city": "含山县", "vid": "2000043235", "lost": 4, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "含山北"},{"rank": 27, "status": "🆕新", "city": "谷城县", "vid": "5310061535", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "谷城县C区"},{"rank": 28, "status": "🆕新", "city": "合肥市", "vid": "5310246743", "lost": 4, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "电力二区-经开区-临湖社区"},{"rank": 29, "status": "🔴7轮", "city": "合肥市", "vid": "5320336964", "lost": 4, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "电力二区-包河区-望湖城"},{"rank": 30, "status": "🆕新", "city": "亳州市", "vid": "7960061118", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "核心-万达广场-新-A-6区"}];
var CITIES=["亳州市", "六安市", "合肥市", "含山县", "咸宁市", "池州市", "滁州市", "肥西县", "蚌埠市", "衡阳市", "襄阳市", "谷城县", "长丰县", "长沙市", "阜南县", "随州市"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/$|\.html$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
