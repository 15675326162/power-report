<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>华东大区 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">
  <h1>📍 华东大区 — 高频缺电 TOP 30</h1>
  <div class="stats">
    <div class="s"><b>284</b>累计丢单</div>
    <div class="s"><b>13</b>城市数</div>
    <div class="s"><b>13</b>🔴未处理</div>
    <div class="s"><b>17</b>🆕新增</div>
    <div class="s"><b>15点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>张茹榕、胡丹萍、鲁宏伟</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🔴24轮", "city": "龙岩市", "vid": "7900003641", "lost": 41, "h1": 12, "delta": "<span class='up'>↑12</span>", "grid": "龙岩学院电力网格"},{"rank": 2, "status": "🔴24轮", "city": "徐州市", "vid": "7960281330", "lost": 25, "h1": 4, "delta": "<span class='up'>↑4</span>", "grid": "铜山一区换电"},{"rank": 3, "status": "🆕新", "city": "徐州市", "vid": "5310072619", "lost": 18, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "泉山二区-北换电"},{"rank": 4, "status": "🔴6轮", "city": "江宁区", "vid": "5320447815", "lost": 18, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "电力网格-江宁区-高新园区三中队"},{"rank": 5, "status": "🆕新", "city": "溧水区", "vid": "5910860184", "lost": 16, "h1": 12, "delta": "<span class='flat'>-</span>", "grid": "电力战区-溧水区-石湫网格"},{"rank": 6, "status": "🔴12轮", "city": "苏州市", "vid": "5310738289", "lost": 14, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "高新区-汇金大学城"},{"rank": 7, "status": "🔴18轮", "city": "徐州市", "vid": "7960282392", "lost": 11, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "铜山四区换电"},{"rank": 8, "status": "🔴18轮", "city": "徐州市", "vid": "5310355663", "lost": 11, "h1": 4, "delta": "<span class='up'>↑4</span>", "grid": "铜山四区换电"},{"rank": 9, "status": "🔴12轮", "city": "苏州市", "vid": "5310553979", "lost": 11, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "高新区-汇金大学城"},{"rank": 10, "status": "🔴12轮", "city": "苏州市", "vid": "5310275739", "lost": 11, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "高新区-汇金大学城"},{"rank": 11, "status": "🔴6轮", "city": "江宁区", "vid": "5320291941", "lost": 10, "h1": 6, "delta": "<span class='up'>↑6</span>", "grid": "电力网格-江宁区-高新园区四五中队"},{"rank": 12, "status": "🔴12轮", "city": "徐州市", "vid": "5310242171", "lost": 9, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "鼓楼五区换电"},{"rank": 13, "status": "🆕新", "city": "苏州市", "vid": "5310160052", "lost": 9, "h1": 7, "delta": "<span class='flat'>-</span>", "grid": "高新区-汇金大学城"},{"rank": 14, "status": "🔴6轮", "city": "徐州市", "vid": "5310083504", "lost": 8, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "铜山四区换电"},{"rank": 15, "status": "🆕新", "city": "漳州市", "vid": "5310679485", "lost": 7, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 16, "status": "🆕新", "city": "王江泾镇", "vid": "5310027694", "lost": 7, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "主城-王江泾工业区-祝军"},{"rank": 17, "status": "🆕新", "city": "徐州市", "vid": "7960279803", "lost": 6, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "铜山四区换电"},{"rank": 18, "status": "🆕新", "city": "徐州市", "vid": "5310384294", "lost": 6, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "铜山一区换电"},{"rank": 19, "status": "🔴12轮", "city": "嘉兴市", "vid": "5310094663", "lost": 6, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "嘉兴市东北超区"},{"rank": 20, "status": "🆕新", "city": "溧水区", "vid": "5910888252", "lost": 5, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "电力战区-溧水区-石湫网格"},{"rank": 21, "status": "🆕新", "city": "江宁区", "vid": "5320258582", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "电力网格-开发区"},{"rank": 22, "status": "🆕新", "city": "徐州市", "vid": "7010399532", "lost": 5, "h1": 5, "delta": "<span class='flat'>-</span>", "grid": "矿大南湖校区换电"},{"rank": 23, "status": "🔴2轮", "city": "杭州市", "vid": "7900071882", "lost": 4, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "临安-农林大学电力网格-1"},{"rank": 24, "status": "🆕新", "city": "南通市", "vid": "5310214852", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "能达中央公园网格"},{"rank": 25, "status": "🆕新", "city": "厦门市", "vid": "7780105989", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "融合-翔安辖区"},{"rank": 26, "status": "🆕新", "city": "宁波市", "vid": "5310202103", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "南战——印象城"},{"rank": 27, "status": "🆕新", "city": "厦门市", "vid": "7780126796", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "融合-翔安辖区"},{"rank": 28, "status": "🆕新", "city": "厦门市", "vid": "5320089139", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "电力-集美-学村"},{"rank": 29, "status": "🆕新", "city": "泉州台商投资区", "vid": "5320061853", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "百崎乡"},{"rank": 30, "status": "🆕新", "city": "苏州市", "vid": "5310689480", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "吴江区-芦荡湖湿地公园"}];
var CITIES=["南通市", "厦门市", "嘉兴市", "宁波市", "徐州市", "杭州市", "江宁区", "泉州台商投资区", "溧水区", "漳州市", "王江泾镇", "苏州市", "龙岩市"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/$|\.html$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
