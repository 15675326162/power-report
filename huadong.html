<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>华东大区 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">
  <h1>📍 华东大区 — 高频缺电 TOP 30</h1>
  <div class="stats">
    <div class="s"><b>250</b>累计丢单</div>
    <div class="s"><b>14</b>城市数</div>
    <div class="s"><b>12</b>🔴未处理</div>
    <div class="s"><b>18</b>🆕新增</div>
    <div class="s"><b>19点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>鲁宏伟、胡丹萍、张茹榕</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🔴26轮", "city": "宁波市", "vid": "5310130815", "lost": 16, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "西战-天一"},{"rank": 2, "status": "🔴7轮", "city": "长汀县", "vid": "5910843638", "lost": 15, "h1": 5, "delta": "<span class='up'>↑5</span>", "grid": "长汀B区"},{"rank": 3, "status": "🔴7轮", "city": "徐州市", "vid": "5310435705", "lost": 14, "h1": 6, "delta": "<span class='up'>↑6</span>", "grid": "泉山三区-1换电"},{"rank": 4, "status": "🆕新", "city": "宁德市", "vid": "5310152699", "lost": 14, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 5, "status": "🔴20轮", "city": "宁波市", "vid": "7960170422", "lost": 13, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "null"},{"rank": 6, "status": "🔴7轮", "city": "南通市", "vid": "5320098137", "lost": 13, "h1": 4, "delta": "<span class='up'>↑4</span>", "grid": "主城区-南区"},{"rank": 7, "status": "🔴20轮", "city": "平潭县", "vid": "5310514925", "lost": 12, "h1": 4, "delta": "<span class='up'>↑4</span>", "grid": "平潭县-中楼乡-缓冲-北部湾内陆网格"},{"rank": 8, "status": "🆕新", "city": "南通市", "vid": "5320006644", "lost": 10, "h1": 5, "delta": "<span class='flat'>-</span>", "grid": "主城区-南区"},{"rank": 9, "status": "🆕新", "city": "苏州市", "vid": "5310287435", "lost": 8, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "吴中区-小石湖城"},{"rank": 10, "status": "🆕新", "city": "福安市", "vid": "5310502482", "lost": 8, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "福安市-城阳街道-主城-王基岭行政服务中心"},{"rank": 11, "status": "🆕新", "city": "宁波市", "vid": "5310237675", "lost": 7, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "宁波-景区-东钱湖"},{"rank": 12, "status": "🆕新", "city": "徐州市", "vid": "5310191900", "lost": 7, "h1": 7, "delta": "<span class='flat'>-</span>", "grid": "云龙湖风景区换电"},{"rank": 13, "status": "🆕新", "city": "泰州市", "vid": "5320184806", "lost": 7, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "电力2区-高港南"},{"rank": 14, "status": "🔴7轮", "city": "义乌市", "vid": "5310362249", "lost": 7, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "电力-篁园服装市场-稠城网格组"},{"rank": 15, "status": "🆕新", "city": "宁德市", "vid": "5310200715", "lost": 7, "h1": 5, "delta": "<span class='flat'>-</span>", "grid": "R.新能源2区"},{"rank": 16, "status": "🔴7轮", "city": "南通市", "vid": "5310037039", "lost": 7, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "主城区-南区"},{"rank": 17, "status": "🆕新", "city": "越城区", "vid": "5320154619", "lost": 7, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "绍兴市越城区-府山街道-主城-阳明故里-李皓"},{"rank": 18, "status": "🆕新", "city": "义乌市", "vid": "5310424075", "lost": 7, "h1": 7, "delta": "<span class='flat'>-</span>", "grid": "电力-篁园服装市场-稠城网格组"},{"rank": 19, "status": "🆕新", "city": "徐州市", "vid": "5310293268", "lost": 7, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "经开四区换电"},{"rank": 20, "status": "🔴7轮", "city": "宁波市", "vid": "5310037378", "lost": 6, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "北战--外滩"},{"rank": 21, "status": "🆕新", "city": "长汀县", "vid": "5910870202", "lost": 6, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "长汀B区"},{"rank": 22, "status": "🆕新", "city": "南通市", "vid": "5320099069", "lost": 6, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "主城区-南区"},{"rank": 23, "status": "🆕新", "city": "丽水市", "vid": "7900127250", "lost": 6, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "三区-丽水客运站（融合）"},{"rank": 24, "status": "🔴7轮", "city": "宁波市", "vid": "5310088076", "lost": 6, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "北战—江北万达"},{"rank": 25, "status": "🔴7轮", "city": "常州市", "vid": "7780317571", "lost": 6, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "天宁区-青果巷核心城区-电力网格"},{"rank": 26, "status": "🆕新", "city": "南通市", "vid": "5320092466", "lost": 6, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "南通主城区北区"},{"rank": 27, "status": "🆕新", "city": "徐州市", "vid": "7960190299", "lost": 6, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "泉山三区-2换电"},{"rank": 28, "status": "🆕新", "city": "徐州市", "vid": "5310512197", "lost": 6, "h1": 6, "delta": "<span class='flat'>-</span>", "grid": "泉山一区-东换电"},{"rank": 29, "status": "🆕新", "city": "扬州市", "vid": "5310512113", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "null"},{"rank": 30, "status": "🔴2轮", "city": "宁波市", "vid": "7960262443", "lost": 5, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "西战-欧尚"}];
var CITIES=["丽水市", "义乌市", "南通市", "宁德市", "宁波市", "常州市", "平潭县", "徐州市", "扬州市", "泰州市", "福安市", "苏州市", "越城区", "长汀县"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/$|\.html$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
