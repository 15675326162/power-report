<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>华东大区 缺电详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f5f6fa;color:#222;font-size:14px}
.hd{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;padding:14px 16px}
.hd h1{font-size:16px;font-weight:700;margin-bottom:10px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.s{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.6}
.s b{font-size:18px;display:block;font-weight:700}
.filter{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.filter-row{display:flex;gap:8px;align-items:center}
.filter input{border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;background:#fafafa;flex:1}
.filter button{background:#1e88e5;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.city-tag{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid #ccc;background:#f5f5f5;color:#555;cursor:pointer;user-select:none;transition:all .2s}
.city-tag.active{background:#1e88e5;color:#fff;border-color:#1e88e5}
.cnt{font-size:12px;color:#888;padding:6px 12px;background:#f9f9f9;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th{background:#f0f2f8;color:#555;padding:8px 6px;font-size:12px;font-weight:600;text-align:left}
td{padding:8px 6px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rep{background:#fff8f8}
.vid{font-family:monospace;font-size:11px;color:#666}
.num{font-weight:700;color:#d32f2f;text-align:right}
.h1n{font-weight:700;color:#e65100;text-align:right}
.up{color:#d32f2f;font-weight:600}.dn{color:#388e3c;font-weight:600}.flat{color:#aaa}
.tag{font-size:11px;font-weight:600;white-space:nowrap}
.tag.r{color:#d32f2f}.tag.n{color:#388e3c}
.grid{color:#999;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:30px;color:#aaa}
</style>
</head><body>
<div class="hd">
  <h1>📍 华东大区 — 高频缺电 TOP 30</h1>
  <div class="stats">
    <div class="s"><b>196</b>累计丢单</div>
    <div class="s"><b>14</b>城市数</div>
    <div class="s"><b>10</b>🔴未处理</div>
    <div class="s"><b>20</b>🆕新增</div>
    <div class="s"><b>12点</b>时段</div>
    <div class="s"><b id="pv">-</b>查看</div>
    <div class="s"><b>胡丹萍、鲁宏伟、张茹榕、项紫艳</b>负责人</div>
  </div>
</div>
<div class="filter">
  <div class="city-tags" id="cityTags"></div>
  <div class="filter-row">
    <input id="fLost" type="number" placeholder="累计丢单≥" min="0">
    <button onclick="apply()">应用</button>
    <button onclick="reset()" style="background:#888">重置</button>
  </div>
</div>
<div class="cnt" id="cnt"></div>
<div style="overflow-x:auto">
<table>
<thead><tr>
  <th style="width:24px">#</th>
  <th>状态</th>
  <th>城市</th>
  <th>车编</th>
  <th style="text-align:right">累计</th>
  <th style="text-align:right">近1h</th>
  <th style="text-align:right">变化</th>
  <th>网格</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
var DATA=[{"rank": 1, "status": "🔴12轮", "city": "徐州市", "vid": "5310370809", "lost": 16, "h1": 6, "delta": "<span class='up'>↑6</span>", "grid": "铜山四区换电"},{"rank": 2, "status": "🔴12轮", "city": "海州区", "vid": "5310707979", "lost": 15, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "海州区换电网络2区"},{"rank": 3, "status": "🆕新", "city": "南通市", "vid": "5320140440", "lost": 15, "h1": 7, "delta": "<span class='flat'>-</span>", "grid": "开发区网格"},{"rank": 4, "status": "🔴6轮", "city": "徐州市", "vid": "7960281816", "lost": 15, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "铜山四区换电"},{"rank": 5, "status": "🆕新", "city": "徐州市", "vid": "5310434600", "lost": 12, "h1": 4, "delta": "<span class='flat'>-</span>", "grid": "泉山四区-1换电"},{"rank": 6, "status": "🔴12轮", "city": "徐州市", "vid": "7960239904", "lost": 8, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "铜山二区换电"},{"rank": 7, "status": "🔴6轮", "city": "宁波市", "vid": "5310043994", "lost": 7, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "null"},{"rank": 8, "status": "🔴6轮", "city": "滨江区", "vid": "5310111511", "lost": 6, "h1": 2, "delta": "<span class='up'>↑2</span>", "grid": "滨江区-电力网格"},{"rank": 9, "status": "🆕新", "city": "南通市", "vid": "5310198643", "lost": 6, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "开发区网格"},{"rank": 10, "status": "🆕新", "city": "厦门市", "vid": "5310488046", "lost": 6, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "融合-海沧A区"},{"rank": 11, "status": "🔴6轮", "city": "徐州市", "vid": "5310442008", "lost": 6, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "矿大南湖校区换电"},{"rank": 12, "status": "🔴6轮", "city": "徐州市", "vid": "7960225390", "lost": 6, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "经开五区换电"},{"rank": 13, "status": "🔴6轮", "city": "扬州市", "vid": "3720201530", "lost": 6, "h1": 3, "delta": "<span class='up'>↑3</span>", "grid": "扬州1"},{"rank": 14, "status": "🆕新", "city": "玄武区", "vid": "5320305819", "lost": 6, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "中山陵"},{"rank": 15, "status": "🆕新", "city": "徐州市", "vid": "5310291522", "lost": 5, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "云龙五区换电"},{"rank": 16, "status": "🆕新", "city": "溧阳市", "vid": "2000044996", "lost": 5, "h1": 5, "delta": "<span class='flat'>-</span>", "grid": "溧阳市换电网格 古县街道 南航大学"},{"rank": 17, "status": "🆕新", "city": "玄武区", "vid": "5320200343", "lost": 5, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "中山陵"},{"rank": 18, "status": "🆕新", "city": "启东市", "vid": "7900206989", "lost": 5, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "启东电力网格1"},{"rank": 19, "status": "🔴6轮", "city": "徐州市", "vid": "7960186021", "lost": 5, "h1": 1, "delta": "<span class='up'>↑1</span>", "grid": "泉山一区-西换电"},{"rank": 20, "status": "🆕新", "city": "徐州市", "vid": "5310436997", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "铜山三区换电"},{"rank": 21, "status": "🆕新", "city": "邳州市", "vid": "7780211114", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "邳州七区"},{"rank": 22, "status": "🆕新", "city": "南京市", "vid": "5320119850", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "东大九龙湖"},{"rank": 23, "status": "🆕新", "city": "徐州市", "vid": "7960190318", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "铜山二区换电"},{"rank": 24, "status": "🆕新", "city": "丽水市", "vid": "7780371138", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "经开区-七百秧电力网格"},{"rank": 25, "status": "🆕新", "city": "启东市", "vid": "7900207243", "lost": 4, "h1": 3, "delta": "<span class='flat'>-</span>", "grid": "启东电力网格1"},{"rank": 26, "status": "🆕新", "city": "厦门市", "vid": "5320127221", "lost": 4, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "融合-海沧D区"},{"rank": 27, "status": "🆕新", "city": "宁波市", "vid": "5310088076", "lost": 4, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "北战—江北万达"},{"rank": 28, "status": "🆕新", "city": "启东市", "vid": "7900087774", "lost": 3, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "启东市电力网格2"},{"rank": 29, "status": "🆕新", "city": "启东市", "vid": "7900215961", "lost": 3, "h1": 1, "delta": "<span class='flat'>-</span>", "grid": "启东市电力网格2"},{"rank": 30, "status": "🆕新", "city": "瑞安市", "vid": "7900102503", "lost": 3, "h1": 2, "delta": "<span class='flat'>-</span>", "grid": "香水美寓"}];
var CITIES=["丽水市", "南京市", "南通市", "厦门市", "启东市", "宁波市", "徐州市", "扬州市", "海州区", "溧阳市", "滨江区", "玄武区", "瑞安市", "邳州市"];
var selectedCities=new Set();
function initTags(){
  var box=document.getElementById('cityTags');
  CITIES.forEach(function(c){
    var t=document.createElement('span');
    t.className='city-tag';
    t.textContent=c;
    t.onclick=function(){
      if(selectedCities.has(c)){selectedCities.delete(c);t.className='city-tag';}
      else{selectedCities.add(c);t.className='city-tag active';}
      render();
    };
    box.appendChild(t);
  });
}
function apply(){
  render();
}
function render(){
  var lost=parseInt(document.getElementById('fLost').value)||0;
  var rows=DATA.filter(function(r){
    return (selectedCities.size===0||selectedCities.has(r.city))&&r.lost>=lost;
  });
  var html='';
  rows.forEach(function(r,i){
    var isRep=r.status.indexOf('🔴')>=0;
    html+='<tr class="'+(isRep?'rep':'')+'">';
    html+='<td style="color:#aaa;font-size:11px">'+(i+1)+'</td>';
    html+='<td><span class="tag '+(isRep?'r':'n')+'">'+r.status+'</span></td>';
    html+='<td>'+r.city+'</td>';
    html+='<td class="vid">'+r.vid+'</td>';
    html+='<td class="num">'+r.lost+'</td>';
    html+='<td class="h1n">'+r.h1+'</td>';
    html+='<td>'+r.delta+'</td>';
    html+='<td class="grid" title="'+r.grid+'">'+r.grid+'</td>';
    html+='</tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="8" class="empty">无匹配数据，请调整筛选条件</td></tr>';
  document.getElementById('cnt').textContent='显示 '+rows.length+' / '+DATA.length+' 条';
}
function reset(){
  selectedCities.clear();
  var tags=document.querySelectorAll('.city-tag');
  for(var i=0;i<tags.length;i++)tags[i].className='city-tag';
  document.getElementById('fLost').value='';
  render();
}
initTags();
render();
</script>
<script>
(function(){
  var p=location.pathname.replace(/^\/|\/$|\.html$/g,'');
  if(!p)return;
  fetch('/api/count?page='+encodeURIComponent(p),{method:'POST'})
    .then(function(r){return r.json()})
    .then(function(d){var e=document.getElementById('pv');if(e&&d.views)e.textContent=d.views})
    .catch(function(){});
})();
</script>
</body></html>
